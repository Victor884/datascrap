name: Daily DataScrap

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: "America/Sao_Paulo"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r pipelines/requirements.txt

      - name: Rodar scrapers
        run: |
          python pipelines/jobspy_scraper.py --out data/raw/vagas-jobspy.csv

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Rodar scraper em Go
        run: |
          go run ./apps/scraper-go --out data/raw/vagas-dados.csv

      - name: Processar dados brutos
        run: |
          python pipelines/clean_jobs.py --input-dir data/raw --out data/processed/vagas-processadas.csv

      - name: Sincronizar banco relacional
        run: |
          python pipelines/sync_jobs_db.py --input data/processed/vagas-processadas.csv --db data/warehouse/jobs.sqlite3

      - name: Gerar snapshot analítico
        run: |
          python pipelines/build_snapshot.py --db data/warehouse/jobs.sqlite3 --out data/snapshots/jobs-snapshot.json

      - name: Publicar artefatos gerados
        uses: actions/upload-artifact@v4
        with:
          name: raw-job-data
          path: |
            data/raw/*.csv
            data/processed/*.csv
            data/warehouse/*.sqlite3
            data/snapshots/*.json