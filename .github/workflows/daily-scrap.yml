name: Daily DataScrap

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: "America/Sao_Paulo"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-jobspy.txt

      - name: Rodar scrapers
        run: |
          python scripts/jobspy_scraper.py

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Rodar scraper em Go
        run: |
          go run cmd/datascrap/main.go --out vagas-dados.csv

      - name: Salvar resultados no repositório
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add vagas-jobspy.csv vagas-dados.csv
          git commit -m "Atualizando base de vagas [skip ci]" || true
          git push