services:
  api:
    image: python:3.11-slim
    working_dir: /workspace/apps/api
    env_file:
      - .env
    volumes:
      - ./:/workspace
    command: sh -c "pip install -r requirements.txt && python -m flask --app app run --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"

  web:
    image: node:20-alpine
    working_dir: /workspace/apps/web
    env_file:
      - .env
    volumes:
      - ./:/workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
