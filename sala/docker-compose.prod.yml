services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 5000
    volumes:
      - ./data:/app/data
    ports:
      - "5000:5000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://127.0.0.1:5000}
    depends_on:
      - api
    ports:
      - "5173:3000"
